<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lily莉莉の預約系統</title>
  <style>
    /* 基礎網頁與完整背景圖設定 */
    body {
      margin: 0;
      padding: 0;
      font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      background-image: url('B936BD7D-EEAB-45FE-972E-EB27AF6DC5CB.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      color: #5c4362;
    }

    .container {
      width: 100%;
      max-width: 414px;
      padding: 24px 16px;
      box-sizing: border-box;
    }

    /* 頂部 Header：Logo 與 Wordmark 標題配置（已放大尺寸並完美置中） */
    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-top: 20px;
      margin-bottom: 28px;
    }

    .logo-img {
      width: 110px;
      height: 110px;
      object-fit: contain;
    }

    .wordmark-img {
      width: 210px;
      height: auto;
      object-fit: contain;
    }

    /* 選項卡片區塊 */
    .grid-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.75);
      border: 1px solid #f0d5e5;
      border-radius: 16px;
      padding: 16px 12px;
      text-align: center;
      box-shadow: 0 4px 12px rgba(220, 190, 210, 0.2);
    }

    .card h3 {
      font-size: 16px;
      margin: 10px 0 6px 0;
      color: #4a2e4b;
    }

    .card p {
      font-size: 11px;
      color: #8c738f;
      line-height: 1.4;
      margin: 0;
    }

    /* 個人簡介區塊 */
    .profile-card {
      background: rgba(255, 255, 255, 0.75);
      border: 1px solid #f0d5e5;
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .profile-content h2 {
      font-size: 15px;
      margin: 0 0 6px 0;
      color: #4a2e4b;
    }

    .profile-content p {
      font-size: 11.5px;
      color: #6d5572;
      line-height: 1.5;
      margin: 0;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <img src="IMG_5345.png" alt="Logo" class="logo-img">
      <img src="IMG_5344.png" alt="Lily莉莉の預約系統" class="wordmark-img">
    </div>

    <div class="grid-buttons">
      <div class="card">
        <h3>填寫預約</h3>
        <p>第一次預約或重新填寫資料，從這裡開始。</p>
      </div>
      <div class="card">
        <h3>查詢 / 改期預約</h3>
        <p>查詢既有預約、申請改期或取消。</p>
      </div>
    </div>

    <div class="profile-card">
      <div class="profile-content">
        <h2>146cm の小隻髮型師 ♡</h2>
        <p>用細心與耐心，根據你的臉型、髮質與生活習慣，搭配色彩分析，設計真正適合你的髮型。<br><br>不盲目追求流行，希望每一次完成的造型，不只好看，也能讓你回家後更容易整理。</p>
      </div>
    </div>
  </div>

</body>
</html>
