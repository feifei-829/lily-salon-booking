<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lily莉莉の預約系統</title>
  <style>
    /* 基礎背景與色調設定 */
    body {
      margin: 0;
      padding: 0;
      font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      background: linear-gradient(180deg, #fcebf3 0%, #f3e8f9 50%, #fef8fb 100%);
      display: flex;
      justify-content: center;
      color: #5c4362;
    }

    .container {
      width: 100%;
      max-width: 414px; /* 手機顯示寬度 */
      padding: 20px 16px;
      box-sizing: border-box;
    }

    /* 頂部 Header 區域 */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
      margin-bottom: 24px;
    }

    .logo-img {
      width: 80px;
      height: 80px;
      object-fit: contain;
    }

    .wordmark-img {
      height: 60px;
      object-fit: contain;
    }

    .avatar-wrapper {
      width: 85px;
      height: 85px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid #e8c4d8;
      box-shadow: 0 0 10px rgba(223, 180, 208, 0.5);
    }

    .avatar-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* 按鈕卡片區塊 */
    .grid-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.65);
      border: 1px solid #f0d5e5;
      border-radius: 16px;
      padding: 16px 12px;
      text-align: center;
      backdrop-filter: blur(5px);
      box-shadow: 0 4px 12px rgba(220, 190, 210, 0.2);
    }

    .card h3 {
      font-size: 16px;
      margin: 10px 0 6px 0;
      color: #4a2e4b;
    }

    .card p {
      font-size: 11px;
      color: #8c738f;
      line-height: 1.4;
      margin: 0;
    }

    /* 個人簡介區塊 */
    .profile-card {
      background: rgba(255, 255, 255, 0.65);
      border: 1px solid #f0d5e5;
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 20px;
      display: flex;
      gap: 12px;
    }

    .profile-avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
    }

    .profile-content h2 {
      font-size: 15px;
      margin: 0 0 6px 0;
      color: #4a2e4b;
    }

    .profile-content p {
      font-size: 11.5px;
      color: #6d5572;
      line-height: 1.5;
      margin: 0;
    }

    /* 底部預約大按鈕 */
    .submit-btn {
      width: 100%;
      padding: 14px 0;
      background: linear-gradient(90deg, #d88eb1 0%, #a282b9 100%);
      color: #ffffff;
      border: none;
      border-radius: 30px;
      font-size: 18px;
      letter-spacing: 2px;
      box-shadow: 0 4px 15px rgba(180, 130, 170, 0.4);
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Header 頂部 -->
    <div class="header">
      <!-- 放入你的 LOGO 檔名 -->
      <img src="IMG_5345.png" alt="Logo" class="logo-img">
      
      <!-- 放入你的 Wordmark 標題檔名 -->
      <img src="IMG_5344.png" alt="Lily莉莉の預約系統" class="wordmark-img">
      
      <!-- 大頭貼區域 -->
      <div class="avatar-wrapper">
        <img src="avatar.jpg" alt="Lily">
      </div>
    </div>

    <!-- 選項卡片 -->
    <div class="grid-buttons">
      <div class="card">
        <h3>填寫預約</h3>
        <p>第一次預約或重新填寫資料，從這裡開始。</p>
      </div>
      <div class="card">
        <h3>查詢 / 改期預約</h3>
        <p>查詢既有預約、申請改期或取消。</p>
      </div>
    </div>

    <!-- 設計師簡介區塊 -->
    <div class="profile-card">
      <img src="avatar.jpg" alt="Lily" class="profile-avatar">
      <div class="profile-content">
        <h2>146cm の小隻髮型師 ♡</h2>
        <p>用細心與耐心，根據你的臉型、髮質與生活習慣，搭配色彩分析，設計真正適合你的髮型。</p>
      </div>
    </div>

    <!-- 底部行動按鈕 -->
    <button class="submit-btn">開始預約 →</button>
  </div>

</body>
</html>
